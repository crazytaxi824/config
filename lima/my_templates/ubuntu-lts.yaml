# DOCS: https://github.com/lima-vm/lima/blob/master/templates/default.yaml

# 使用方法:
# `limactl create --name=ubuntu --mount-none --vm-type=vz --rosetta ./ubuntu_lts.yaml`
# `limactl create --name=ubuntu --mount-none --vm-type=vz --rosetta template:ubuntu-lts`

minimumLimaVersion: 2.0.0

# NOTE: base 和 images 选一个用就可以了
# base:
# - template:ubuntu-lts

