# 资源
cpus: 4

# min("4GiB")
memory: "4GiB"

# NOTE: 不可后期改动
disk: "100GiB"

vmType: "vz"
# NOTE: 开启 rosetta in vz
# vmOpts:
#   vz:
#     rosetta:
#       # 默认为 false, 需要运行 x86 container 的时候再打开.
#       enabled: true
#       binfmt: true

# no disk mount
mounts: null

# install ubuntu without containerd
containerd:
  system: false
  user: false

# FIX: SSH server does not seem to be running on vsock port, using usernet forwarder
ssh:
  overVsock: false

# `$ limactl network list`
# networks: "host", "bridge", "user-v2" 的 gateway 和 mask 定义在 ~/.lima/_config/networks.yaml
networks:
# 使用 macOS Virtualization.Framework 的 NAT 模式
- vzNAT: true
# "bridge": 虚拟一个新的机器, 虚拟机会直接向路由器 DHCP 服务器申请 IP. 虚拟机 <-> 局域网: 相互访问无限制
# "user-v2": 外部物理网络根本不知道它的存在. 虚拟机 -> 外部: 通过宿主机 NAT; 外部 -> 虚拟机: port-forward
# "host": 和宿主机公用 ports, 如果 :80 端口被占用, 其他 vm 无法再使用 :80 端口
# 如果需要 vm 间可以互相访问使用 "user-v2" 的解析 vm: "lima-NAME.internal"; 宿主机: "host.lima.internal"
- lima: "user-v2"

# FIX: 禁止 mDNS 占用 5353 UDP
provision:
# mode system 是 root user
- mode: "system"
  script: |
    #!/bin/bash
    # 禁止 global -mDNS, `$ resolvectl status`, `$ sudo lsof -i :5353`. 文件名可能不同
    LIMA_CONF=$(find /etc/systemd/resolved.conf.d/ -type f -name "*mdns*.conf" 2>/dev/null | head -n 1)
    if [ -n "$LIMA_CONF" ]; then
      echo -e "[Resolve]\nMulticastDNS=no\nLLMNR=no" > "$LIMA_CONF"
    fi
    # 重启服务
    systemctl restart systemd-resolved


# guest 端口自动转发到 host
# lima port-forward 使用的是优先匹配机制, 规则是: 按顺序匹配，命中第一条就停止
# "guestIP" omitempty 默认为 "127.0.0.1"
portForwards:
# codex login auth callback port
- guestPort: 1455
  hostPort: 1455
  proto: "tcp"
  hostIP: "127.0.0.1"
# 禁止所有 ports 自动 forward
- guestIP: "0.0.0.0"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true
- guestIP: "::"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true
# 保险起见, 禁止 loopback 地址, localhost, 127.0.0.1, "::1", 自动 forward
- guestIP: "127.0.0.1"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true
- guestIP: "::1"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true

