"$schema" = 'https://starship.rs/config-schema.json'

# 禁止在提示符后换行
add_newline = false

format = """
$username\
${custom.git_branch_main}\
${custom.git_branch_other}\
$hostname\
$git_branch\
$git_status\
$directory\
$fill\
$status\
$cmd_duration\
$line_break\
$character\
"""

[fill]
symbol = " " # 使用空格填充，将后面的内容推向右侧

[username]
# 设置为 true 会让用户名始终显示
show_always = true
style_user = "fg:215 bg:237"
style_root = "fg:black bg:red bold"  # root 用户时的特殊颜色
format = "[ $user ]($style)"  # 动态加载 user, root style

[hostname]
ssh_only = true  # 只在远程时显示 hostname
ssh_symbol = "🌐"
style = "fg:black bg:purple bold"
format = "[ $ssh_symbol $hostname ]($style)"

[git_branch]
disabled = true
# symbol = ""
# style = "fg:236 bg:35 bold"
# format = '[ $symbol $branch ]($style)'

[git_status]
disabled = true
# style = "fg:236 bg:35 bold"
# format = "[$all_status$ahead_behind ]($style)"
# deleted = "✕"
# conflicted = ""

[directory]
style = "fg:251 bg:25 bold"
format = "[ $path ]($style)"
truncation_length = 99
truncate_to_repo = false
truncation_symbol = "…/"

[status]
disabled = false
symbol = "err:"     # 区分普通错误和信号(Signal)
success_symbol = ""  # error_code=0 时不显示
format = "[ $symbol $int ]($style)"

# 执行时间显示 (如果命令运行超过 2 秒则显示)
[cmd_duration]
min_time = 100
style = "fg:240"
format = "[\\($duration\\)]($style)"

# 替换默认的字符图标
[character]
success_symbol = "[\\$](fg:252)"
error_symbol = "[\\$](fg:252)"

[custom.git_branch_main]
command = "git rev-parse --abbrev-ref HEAD"
when = 'git rev-parse --is-inside-work-tree 2>/dev/null && git rev-parse --abbrev-ref HEAD | grep -qE "^(main|master)$"'
format = "[  $output ]($style)"
style = "bold fg:#ffffff bg:#ff5555"

[custom.git_branch_other]
command = "git rev-parse --abbrev-ref HEAD"
when = 'git rev-parse --is-inside-work-tree 2>/dev/null && git rev-parse --abbrev-ref HEAD | grep -qvE "^(main|master)$"'
format = "[  $output ]($style)"
style = "bold fg:#000000 bg:#50fa7b"


